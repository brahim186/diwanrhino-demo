<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIHANIO Edu</title>
<link rel="icon" type="image/png" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Fraunces:wght@500;600&family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --navy: #1B1464;
    --navy-700: #170F52;
    --navy-900: #100B3B;
    --purple: #5B3AA6;
    --gold: #F0A93C;
    --gold-light: #FBC873;
    --gold-dark: #D98F1F;
    --ink: #221D3D;
    --mist: #F6F4FC;
    --line: #E7E2F3;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%; margin: 0;
    background: #ffffff;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    height: 100vh; width: 100%;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse 60% 50% at 50% 42%, var(--mist) 0%, #ffffff 68%);
  }

  /* champ de points digitaux, très discret */
  .field {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 22%, rgba(27,20,100,.18) 0, transparent 100%),
      radial-gradient(1px 1px at 78% 18%, rgba(27,20,100,.14) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 88% 68%, rgba(240,169,60,.4) 0, transparent 100%),
      radial-gradient(1px 1px at 22% 78%, rgba(27,20,100,.16) 0, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(27,20,100,.12) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 12%, rgba(240,169,60,.3) 0, transparent 100%),
      radial-gradient(1px 1px at 92% 40%, rgba(27,20,100,.14) 0, transparent 100%),
      radial-gradient(1px 1px at 6% 55%, rgba(27,20,100,.14) 0, transparent 100%);
    opacity: .8;
    animation: drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-10px) scale(1.01); }
  }

  /* anneau conique tournant très lent, à peine visible, cerne le halo */
  .ring {
    position: absolute;
    width: min(58vw, 520px); aspect-ratio: 1;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(240,169,60,.16) 60deg, transparent 130deg,
      rgba(91,58,166,.22) 220deg, transparent 300deg, transparent 360deg);
    filter: blur(2px);
    animation: spin 30s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: 0 24px;
  }

  /* halo respirant derrière le logo */
  .halo {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,169,60,.55) 0%, rgba(240,169,60,.18) 40%, transparent 72%);
    filter: blur(6px);
    opacity: 0;
    animation-name: breathe, haloIn;
    animation-duration: 3.6s, .9s;
    animation-delay: .4s, .4s;
    animation-iteration-count: infinite, 1;
    animation-fill-mode: none, forwards;
    animation-timing-function: ease-in-out, ease;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(.92); opacity: .55; }
    50%      { transform: scale(1.12); opacity: .95; }
  }
  @keyframes haloIn {
    from { opacity: 0; transform: scale(.6); }
    to   { opacity: .55; transform: scale(.92); }
  }

  .logo-wrap {
    position: relative;
    width: 128px; height: 128px;
    display: grid; place-items: center;
    opacity: 0;
    transform: scale(.82);
    animation: logoIn 1s cubic-bezier(.16,.9,.3,1) .15s forwards;
  }
  @keyframes logoIn {
    to { opacity: 1; transform: scale(1); }
  }

  .logo-wrap img {
    position: relative; z-index: 2;
    width: 96px; height: 96px; object-fit: contain;
    filter: drop-shadow(0 0 18px rgba(240,169,60,.55));
    animation: glowPulse 3.6s ease-in-out .4s infinite;
  }
  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(240,169,60,.4)); }
    50%      { filter: drop-shadow(0 0 30px rgba(240,169,60,.85)); }
  }

  .wordmark {
    margin-top: 30px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2.1rem, 6vw, 3.4rem);
    letter-spacing: .01em;
    color: var(--navy);
    opacity: 0;
    animation: riseIn .8s ease .95s forwards;
  }
  .wordmark .edu {
    color: var(--gold-dark);
    font-style: italic;
    font-weight: 500;
  }

  .tagline {
    margin-top: 12px;
    font-size: .8rem;
    font-weight: 500;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(34,29,61,.5);
    opacity: 0;
    animation: riseIn .8s ease 1.25s forwards;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .rule {
    margin-top: 22px;
    width: 34px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    animation: riseIn .8s ease 1.1s forwards;
  }

  @media (prefers-reduced-motion: reduce) {
    .field, .ring, .halo, .logo-wrap img { animation: none !important; }
    .logo-wrap, .wordmark, .tagline, .rule { animation: riseIn .01ms forwards; opacity: 1; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="field"></div>
  <div class="ring"></div>

  <div class="content">
    <div class="halo"></div>
    <div class="logo-wrap">
      <img src="logo.png" alt="Logo RIHANIO">
    </div>

    <h1 class="wordmark">RIHANIO <span class="edu">Edu</span></h1>
    <div class="rule"></div>
    <p class="tagline">L'excellence digitale au service de l'éducation</p>
  </div>
</div>

</body>
</html>
